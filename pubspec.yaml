name: sign_bridge
description: SignBridge - AI Sign Language & Accessibility Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # Permissions
  permission_handler: ^11.3.0

  # Icons
  cupertino_icons: ^1.0.6

  # Shared prefs
  shared_preferences: ^2.2.2

  # Text to Speech
  flutter_tts: ^3.8.5

  # Path utilities
  path_provider: ^2.1.2
  path: ^1.9.0

  # Image processing
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/asl_model.tflite
    - assets/models/labels.json
